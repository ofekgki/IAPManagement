# Local development stack for the Purchase SDK platform: PostgreSQL + backend + portal web.
#   docker compose up --build
# Portal:   http://localhost:5173
# Backend:  http://localhost:8080
# Postgres: localhost:5432
#
# Secrets below are DEV defaults only. Override via a .env file (see .env.example). Do not commit real secrets.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-purchase_sdk}
      POSTGRES_USER: ${DATABASE_USER:-purchase}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-purchase}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Target the real database; without -d, pg_isready defaults dbname to the username
      # ("purchase"), which doesn't exist and logs a harmless FATAL.
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-purchase} -d ${DATABASE_NAME:-purchase_sdk}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME:-purchase_sdk}
      DATABASE_USER: ${DATABASE_USER:-purchase}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-purchase}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-jwt-secret-change-me-please-0123456789}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-dev-insecure-api-key-pepper}
      INTERNAL_ADMIN_TOKEN: ${INTERNAL_ADMIN_TOKEN:-dev_internal_admin_token}
      PORTAL_FRONTEND_URL: ${PORTAL_FRONTEND_URL:-http://localhost:5173}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  portal:
    build:
      context: ./portal-web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
